<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jurnal 7KAIH - SD Negeri 17 Dauh Puri</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            nunito: ['Nunito', 'sans-serif']
          },
          colors: {
            royal: '#2563eb',
            royalDark: '#1d4ed8',
            royalLight: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .modal-overlay {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    .habit-card {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .habit-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .habit-card:hover::before {
      left: 100%;
    }
    .habit-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15);
    }
    .habit-card:active {
      transform: scale(0.96);
    }
    .habit-emoji {
      display: inline-block;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .habit-card:nth-child(1) .habit-emoji { animation-delay: 0s; }
    .habit-card:nth-child(2) .habit-emoji { animation-delay: 0.1s; }
    .habit-card:nth-child(3) .habit-emoji { animation-delay: 0.2s; }
    .habit-card:nth-child(4) .habit-emoji { animation-delay: 0.3s; }
    .habit-card:nth-child(5) .habit-emoji { animation-delay: 0.4s; }
    .habit-card:nth-child(6) .habit-emoji { animation-delay: 0.5s; }
    .habit-card:nth-child(7) .habit-emoji { animation-delay: 0.6s; }
    .habit-card:nth-child(8) .habit-emoji { animation-delay: 0.7s; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(35%) sepia(76%) saturate(2878%) hue-rotate(213deg) brightness(97%) contrast(91%);
    }
    .header-decoration {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .star { animation: twinkle 1.5s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-50 overflow-auto">
  <div id="app" class="w-full min-h-full pb-8"><!-- Header -->
   <header class="bg-gradient-to-br from-royal via-blue-400 to-cyan-500 text-white pt-8 pb-16 px-4 rounded-b-[2.5rem] shadow-lg shadow-blue-400/30 relative overflow-hidden"><!-- Animated background decorations -->
    <div class="absolute top-8 right-12 text-4xl header-decoration">
     🌟
    </div>
    <div class="absolute top-16 left-8 text-3xl header-decoration" style="animation-delay: 0.5s;">
     ✨
    </div>
    <div class="absolute bottom-12 right-6 text-2xl header-decoration" style="animation-delay: 1s;">
     ⭐
    </div>
    <div class="absolute bottom-8 left-1/4 text-3xl header-decoration" style="animation-delay: 1.5s;">
     🎯
    </div>
    <div class="text-center relative z-10">
     <div class="mb-3 text-4xl animate-bounce">
      🚀
     </div>
     <h1 class="text-3xl font-black tracking-widest leading-tight mb-2" style="background: linear-gradient(135deg, #fff, #fef08a, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));">JURNAL 7 KEBIASAAN<br>
       ANAK INDONESIA HEBAT</h1>
     <p id="school-name" class="mt-4 text-base font-black drop-shadow-lg px-4 py-2 rounded-2xl inline-block" style="background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #78350f; box-shadow: 0 8px 16px rgba(0,0,0,0.15); text-transform: uppercase;">SD NEGERI 17 DAUH PURI</p>
    </div>
   </header><!-- Student Profile Card (Floating) -->
   <div class="px-4 -mt-10 relative z-10">
    <div id="profile-card" class="bg-white rounded-3xl shadow-xl p-5 border border-slate-100">
     <div id="profile-empty" class="text-center py-4">
      <div class="w-16 h-16 bg-blue-50 rounded-full mx-auto flex items-center justify-center mb-3">
       <svg class="w-8 h-8 text-royal" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
       </svg>
      </div>
      <p class="text-slate-400 text-sm">Belum ada data siswa</p>
      <p class="text-royal text-xs mt-1 font-semibold">Tap "Identitas Siswa" untuk mengisi</p>
     </div>
     <div id="profile-filled" class="hidden">
      <div class="flex items-center gap-4">
       <div class="w-14 h-14 bg-gradient-to-br from-royal to-royalLight rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
       </div>
       <div class="flex-1 min-w-0">
        <h3 id="display-name" class="font-bold text-slate-800 text-lg truncate">-</h3>
        <p class="text-slate-500 text-sm">Kelas <span id="display-class" class="font-semibold text-royal">-</span> • No. Absen <span id="display-absen" class="font-semibold text-royal">-</span></p>
       </div>
      </div>
     </div>
    </div>
   </div><!-- Menu Grid -->
   <div class="px-4 mt-6">
    <h2 class="text-slate-700 font-bold text-lg mb-4 flex items-center gap-2"><span class="w-1.5 h-6 bg-royal rounded-full"></span> Menu Kebiasaan</h2>
    <div class="grid grid-cols-2 gap-3"><!-- Identitas Siswa --> <button onclick="openModal('identitas')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-violet-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">👤</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Identitas Siswa</h3><p class="text-slate-400 text-xs mt-0.5">Data diri</p></button> <!-- Bangun Pagi --> <button onclick="openModal('bangun')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">🌅</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Bangun Pagi</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 1</p></button> <!-- Beribadah --> <button onclick="openModal('ibadah')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">🙏</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Beribadah</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 2</p></button> <!-- Berolahraga --> <button onclick="openModal('olahraga')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-rose-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">🏃</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Berolahraga</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 3</p></button> <!-- Makan Sehat --> <button onclick="openModal('makan')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">🥗</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Makan Sehat</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 4</p></button> <!-- Gemar Belajar --> <button onclick="openModal('belajar')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">📚</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Gemar Belajar</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 5</p></button> <!-- Bermasyarakat --> <button onclick="openModal('masyarakat')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-cyan-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">👥</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Bermasyarakat</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 6</p></button> <!-- Tidur Cepat --> <button onclick="openModal('tidur')" class="habit-card bg-white rounded-2xl p-4 shadow-md border border-slate-100 text-left hover:shadow-lg">
      <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center mb-3 text-2xl"><span class="habit-emoji">🌙</span>
      </div><h3 class="font-bold text-slate-700 text-sm">Tidur Cepat</h3><p class="text-slate-400 text-xs mt-0.5">Kebiasaan 7</p></button>
    </div>
   </div><!-- Rekap Section -->
   <div class="px-4 mt-8">
    <h2 class="text-slate-700 font-bold text-lg mb-4 flex items-center gap-2"><span class="w-1.5 h-6 bg-royal rounded-full"></span> Rekapan &amp; Laporan</h2><!-- Filter Buttons -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-2"><button onclick="setFilter('daily')" id="filter-daily" class="filter-btn px-4 py-2 bg-royal text-white rounded-xl text-sm font-semibold whitespace-nowrap"> Harian </button> <button onclick="setFilter('weekly')" id="filter-weekly" class="filter-btn px-4 py-2 bg-white text-slate-600 rounded-xl text-sm font-semibold whitespace-nowrap border border-slate-200"> Mingguan </button> <button onclick="setFilter('monthly')" id="filter-monthly" class="filter-btn px-4 py-2 bg-white text-slate-600 rounded-xl text-sm font-semibold whitespace-nowrap border border-slate-200"> Bulanan </button>
    </div><!-- Date Selector (For daily & weekly) -->
    <div id="date-selector" class="mb-4 flex gap-2"><input type="date" id="select-date" class="flex-1 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm text-slate-700 font-semibold">
    </div><!-- Month/Year Selector (For monthly) -->
    <div id="month-selector" class="hidden mb-4 flex gap-2"><select id="select-month" class="flex-1 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm text-slate-700 font-semibold"> <option value="0">Januari</option> <option value="1">Februari</option> <option value="2">Maret</option> <option value="3">April</option> <option value="4">Mei</option> <option value="5">Juni</option> <option value="6">Juli</option> <option value="7">Agustus</option> <option value="8">September</option> <option value="9">Oktober</option> <option value="10">November</option> <option value="11">Desember</option> </select> <select id="select-year" class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm text-slate-700 font-semibold"> </select>
    </div><!-- Data List -->
    <div id="data-list" class="space-y-3 mb-4">
     <div class="bg-white rounded-2xl p-6 text-center border border-slate-100">
      <svg class="w-12 h-12 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <p class="text-slate-400 text-sm">Belum ada data kebiasaan</p>
     </div>
    </div><!-- Export PDF Button --> <button onclick="exportPDF()" class="w-full bg-gradient-to-r from-royal to-royalDark text-white py-4 rounded-2xl font-bold text-base shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 hover:shadow-xl transition-shadow">
     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
     </svg> Download Laporan PDF </button> <!-- Data Count -->
    <p id="data-count" class="text-center text-slate-400 text-xs mt-3">Total: 0 data</p>
   </div>
  </div><!-- Modal Overlay -->
  <div id="modal-overlay" class="fixed inset-0 modal-overlay z-50 hidden flex items-end justify-center">
   <div id="modal-content" class="bg-white w-full max-w-lg rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
    <h3 id="modal-title" class="text-xl font-bold text-slate-800 mb-4">Modal Title</h3>
    <div id="modal-body"></div>
   </div>
  </div><!-- Toast Notification -->
  <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl text-sm font-semibold shadow-xl opacity-0 transition-opacity duration-300 z-50"><span id="toast-message">Data tersimpan!</span>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      school_name: 'SD Negeri 17 Dauh Puri'
    };

    // App State
    let currentFilter = 'daily';
    let studentData = JSON.parse(localStorage.getItem('7kaih_student')) || null;
    let habitsData = JSON.parse(localStorage.getItem('7kaih_habits')) || [];
    let editingId = null;

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const schoolEl = document.getElementById('school-name');
          if (schoolEl) {
            schoolEl.textContent = config.school_name || defaultConfig.school_name;
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['school_name', config.school_name || defaultConfig.school_name]
        ])
      });
    }

    // Habit configurations
    const habitConfig = {
      bangun: {
        title: 'Bangun Pagi',
        icon: '🌅',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam Bangun', type: 'time' },
          { id: 'note', label: 'Keterangan', type: 'text', placeholder: 'Misal: Bangun sendiri tanpa dibangunkan' }
        ]
      },
      ibadah: {
        title: 'Beribadah',
        icon: '🙏',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam', type: 'time' },
          { id: 'note', label: 'Jenis Ibadah', type: 'text', placeholder: 'Misal: Sholat Subuh, Sembahyang pagi' }
        ]
      },
      olahraga: {
        title: 'Berolahraga',
        icon: '🚴',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam', type: 'time' },
          { id: 'duration', label: 'Durasi (menit)', type: 'number', placeholder: '30' },
          { id: 'note', label: 'Jenis Olahraga', type: 'text', placeholder: 'Misal: Bersepeda, Jogging, Senam' }
        ]
      },
      makan: {
        title: 'Makan Sehat',
        icon: '🍎',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam Makan', type: 'time' },
          { id: 'note', label: 'Menu Makanan', type: 'text', placeholder: 'Misal: Nasi, sayur bayam, telur, buah' }
        ]
      },
      belajar: {
        title: 'Gemar Belajar',
        icon: '📚',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam Mulai', type: 'time' },
          { id: 'duration', label: 'Durasi (menit)', type: 'number', placeholder: '60' },
          { id: 'note', label: 'Materi/Pelajaran', type: 'text', placeholder: 'Misal: Matematika, Membaca buku cerita' }
        ]
      },
      masyarakat: {
        title: 'Bermasyarakat',
        icon: '👥',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam', type: 'time' },
          { id: 'note', label: 'Kegiatan', type: 'text', placeholder: 'Misal: Membantu tetangga, Gotong royong' }
        ]
      },
      tidur: {
        title: 'Tidur Cepat',
        icon: '🌙',
        fields: [
          { id: 'date', label: 'Tanggal', type: 'date' },
          { id: 'time', label: 'Jam Tidur', type: 'time' },
          { id: 'note', label: 'Keterangan', type: 'text', placeholder: 'Misal: Tidur setelah belajar' }
        ]
      }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      updateProfileDisplay();
      initYearSelector();
      setCurrentDateAndMonth();
      renderDataList();
      
      document.getElementById('select-date').addEventListener('change', renderDataList);
      document.getElementById('select-month').addEventListener('change', renderDataList);
      document.getElementById('select-year').addEventListener('change', renderDataList);
    });

    function initYearSelector() {
      const yearSelect = document.getElementById('select-year');
      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= currentYear - 2; y--) {
        const option = document.createElement('option');
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }
    }

    function setCurrentDateAndMonth() {
      const now = new Date();
      document.getElementById('select-date').value = now.toISOString().split('T')[0];
      document.getElementById('select-month').value = now.getMonth();
      document.getElementById('select-year').value = now.getFullYear();
    }

    function updateProfileDisplay() {
      const emptyEl = document.getElementById('profile-empty');
      const filledEl = document.getElementById('profile-filled');
      
      if (studentData && studentData.name) {
        emptyEl.classList.add('hidden');
        filledEl.classList.remove('hidden');
        document.getElementById('display-name').textContent = studentData.name;
        document.getElementById('display-class').textContent = studentData.kelas;
        document.getElementById('display-absen').textContent = studentData.absen;
      } else {
        emptyEl.classList.remove('hidden');
        filledEl.classList.add('hidden');
      }
    }

    function openModal(type) {
      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');
      
      overlay.classList.remove('hidden');
      setTimeout(() => {
        content.classList.remove('translate-y-full');
      }, 10);
      
      if (type === 'identitas') {
        title.textContent = '👤 Identitas Siswa';
        body.innerHTML = `
          <form id="identity-form" class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-slate-600 mb-1.5">Nama Lengkap</label>
              <input type="text" id="input-name" value="${studentData?.name || ''}" placeholder="Masukkan nama lengkap" 
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-royal focus:border-transparent">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1.5">Kelas</label>
                <input type="text" id="input-kelas" value="${studentData?.kelas || ''}" placeholder="Misal: 5A" 
                  class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-royal focus:border-transparent">
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-600 mb-1.5">No. Absen</label>
                <input type="number" id="input-absen" value="${studentData?.absen || ''}" placeholder="Misal: 12" 
                  class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-royal focus:border-transparent">
              </div>
            </div>
            <div class="flex gap-3 pt-2">
              <button type="button" onclick="closeModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-600 rounded-xl font-semibold">Batal</button>
              <button type="submit" class="flex-1 px-4 py-3 bg-royal text-white rounded-xl font-semibold">Simpan</button>
            </div>
          </form>
        `;
        document.getElementById('identity-form').addEventListener('submit', (e) => {
          e.preventDefault();
          saveIdentity();
        });
      } else {
        const config = habitConfig[type];
        title.textContent = `${config.icon} ${config.title}`;
        
        const today = new Date().toISOString().split('T')[0];
        const now = new Date().toTimeString().slice(0, 5);
        
        let fieldsHtml = config.fields.map(field => {
          let value = '';
          if (field.type === 'date') value = today;
          if (field.type === 'time') value = now;
          
          return `
            <div>
              <label class="block text-sm font-semibold text-slate-600 mb-1.5">${field.label}</label>
              <input type="${field.type}" id="input-${field.id}" value="${value}" placeholder="${field.placeholder || ''}"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-royal focus:border-transparent">
            </div>
          `;
        }).join('');
        
        body.innerHTML = `
          <form id="habit-form" class="space-y-4">
            ${fieldsHtml}
            <div class="flex gap-3 pt-2">
              <button type="button" onclick="closeModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-600 rounded-xl font-semibold">Batal</button>
              <button type="submit" class="flex-1 px-4 py-3 bg-royal text-white rounded-xl font-semibold">Simpan</button>
            </div>
          </form>
        `;
        
        document.getElementById('habit-form').addEventListener('submit', (e) => {
          e.preventDefault();
          saveHabit(type, config);
        });
      }
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');
      
      content.classList.add('translate-y-full');
      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 300);
    }

    function saveIdentity() {
      const name = document.getElementById('input-name').value.trim();
      const kelas = document.getElementById('input-kelas').value.trim();
      const absen = document.getElementById('input-absen').value.trim();
      
      if (!name || !kelas || !absen) {
        showToast('Mohon lengkapi semua data!');
        return;
      }
      
      studentData = { name, kelas, absen };
      localStorage.setItem('7kaih_student', JSON.stringify(studentData));
      updateProfileDisplay();
      closeModal();
      showToast('Data siswa tersimpan!');
    }

    function saveHabit(type, config) {
      const data = {
        id: Date.now(),
        type: type,
        habit: config.title,
        icon: config.icon,
        date: document.getElementById('input-date').value,
        time: document.getElementById('input-time')?.value || '',
        duration: document.getElementById('input-duration')?.value || '',
        note: document.getElementById('input-note')?.value || ''
      };
      
      if (!data.date) {
        showToast('Mohon isi tanggal!');
        return;
      }
      
      habitsData.push(data);
      localStorage.setItem('7kaih_habits', JSON.stringify(habitsData));
      closeModal();
      renderDataList();
      showToast('Kebiasaan tercatat! 🎉');
    }

    function setFilter(filter) {
      currentFilter = filter;
      editingId = null;
      
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-royal', 'text-white');
        btn.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
      });
      
      const activeBtn = document.getElementById(`filter-${filter}`);
      activeBtn.classList.add('bg-royal', 'text-white');
      activeBtn.classList.remove('bg-white', 'text-slate-600', 'border', 'border-slate-200');
      
      // Show/hide date selector for daily & weekly, hide for monthly
      if (filter === 'monthly') {
        document.getElementById('date-selector').classList.add('hidden');
        document.getElementById('month-selector').classList.remove('hidden');
      } else {
        document.getElementById('date-selector').classList.remove('hidden');
        document.getElementById('month-selector').classList.add('hidden');
      }
      
      renderDataList();
    }

    function getWeekStart(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

    function getFilteredData() {
      const selectedDate = new Date(document.getElementById('select-date').value);
      
      if (currentFilter === 'daily') {
        const dateStr = document.getElementById('select-date').value;
        return habitsData.filter(d => d.date === dateStr);
      } else if (currentFilter === 'weekly') {
        const weekStart = getWeekStart(selectedDate);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 6);
        
        return habitsData.filter(d => {
          const dataDate = new Date(d.date);
          return dataDate >= weekStart && dataDate <= weekEnd;
        });
      } else if (currentFilter === 'monthly') {
        const month = parseInt(document.getElementById('select-month').value);
        const year = parseInt(document.getElementById('select-year').value);
        return habitsData.filter(d => {
          const date = new Date(d.date);
          return date.getMonth() === month && date.getFullYear() === year;
        });
      }
      return habitsData;
    }

    function renderDataList() {
      const container = document.getElementById('data-list');
      const filteredData = getFilteredData();
      
      // Sort by date descending
      filteredData.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      if (filteredData.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-6 text-center border border-slate-100">
            <svg class="w-12 h-12 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p class="text-slate-400 text-sm">Belum ada data kebiasaan</p>
          </div>
        `;
      } else {
        container.innerHTML = filteredData.map(item => `
          <div class="bg-white rounded-2xl p-4 border border-slate-100 flex items-start gap-3">
            <div class="text-2xl">${item.icon}</div>
            <div class="flex-1 min-w-0">
              <h4 class="font-bold text-slate-800 text-sm">${item.habit}</h4>
              ${editingId === item.id ? `
                <div class="space-y-2 mt-2">
                  <input type="date" value="${item.date}" class="w-full px-2 py-1 bg-slate-50 border border-slate-200 rounded text-xs">
                  <input type="time" value="${item.time || ''}" class="w-full px-2 py-1 bg-slate-50 border border-slate-200 rounded text-xs">
                  <input type="text" value="${item.note || ''}" placeholder="Keterangan" class="w-full px-2 py-1 bg-slate-50 border border-slate-200 rounded text-xs">
                </div>
              ` : `
                <p class="text-slate-500 text-xs mt-0.5">${formatDate(item.date)}${item.time ? ' • ' + item.time : ''}</p>
                ${item.note ? `<p class="text-slate-600 text-xs mt-1 bg-slate-50 px-2 py-1 rounded-lg inline-block">${item.note}</p>` : ''}
              `}
            </div>
            ${editingId === item.id ? `
              <div class="flex gap-1">
                <button onclick="saveEditedHabit(${item.id})" class="text-green-500 hover:text-green-700 p-1" title="Simpan">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                </button>
                <button onclick="cancelEditHabit()" class="text-slate-400 hover:text-slate-600 p-1" title="Batal">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
            ` : `
              <div class="flex gap-1">
                <button onclick="editHabit(${item.id})" class="text-blue-500 hover:text-blue-700 p-1" title="Edit">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                  </svg>
                </button>
                <button onclick="deleteHabit(${item.id})" class="text-slate-400 hover:text-red-500 p-1" title="Hapus">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                </button>
              </div>
            `}
          </div>
        `).join('');
      }
      
      document.getElementById('data-count').textContent = `Total: ${filteredData.length} data`;
    }

    function editHabit(id) {
      editingId = id;
      renderDataList();
    }

    function cancelEditHabit() {
      editingId = null;
      renderDataList();
    }

    function saveEditedHabit(id) {
      const item = habitsData.find(d => d.id === id);
      if (item) {
        const container = document.getElementById('data-list');
        const itemEl = container.querySelector(`button[onclick="editHabit(${id})"]`)?.closest('.flex-1')?.parentElement;
        
        if (itemEl) {
          const inputs = itemEl.querySelectorAll('input');
          item.date = inputs[0]?.value || item.date;
          item.time = inputs[1]?.value || item.time;
          item.note = inputs[2]?.value || item.note;
          
          localStorage.setItem('7kaih_habits', JSON.stringify(habitsData));
          editingId = null;
          renderDataList();
          showToast('Data diperbarui! ✏️');
        }
      }
    }

    function deleteHabit(id) {
      const item = document.querySelector(`button[onclick="deleteHabit(${id})"]`).parentElement;
      
      // Two-step deletion
      if (!item.dataset.confirmDelete) {
        item.dataset.confirmDelete = 'true';
        item.classList.add('bg-red-50', 'border-red-200');
        item.querySelector('button').innerHTML = `
          <span class="text-xs text-red-500 font-semibold">Hapus?</span>
        `;
        setTimeout(() => {
          if (item.dataset.confirmDelete) {
            delete item.dataset.confirmDelete;
            item.classList.remove('bg-red-50', 'border-red-200');
            item.querySelector('button').innerHTML = `
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
              </svg>
            `;
          }
        }, 3000);
        return;
      }
      
      habitsData = habitsData.filter(d => d.id !== id);
      localStorage.setItem('7kaih_habits', JSON.stringify(habitsData));
      renderDataList();
      showToast('Data dihapus');
    }

    function formatDate(dateStr) {
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
      const date = new Date(dateStr);
      return `${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2500);
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('landscape', 'mm', 'a4');
      
      const filteredData = getFilteredData();
      
      if (!studentData || !studentData.name) {
        showToast('Mohon isi identitas siswa terlebih dahulu!');
        return;
      }
      
      if (filteredData.length === 0) {
        showToast('Tidak ada data untuk diexport!');
        return;
      }
      
      // Sort by date
      filteredData.sort((a, b) => new Date(a.date) - new Date(b.date));
      
      // Page dimensions: A4 landscape = 297 x 210 mm
      const pageWidth = doc.internal.pageSize.getWidth(); // 297
      const pageHeight = doc.internal.pageSize.getHeight(); // 210
      const centerX = pageWidth / 2;
      const leftMargin = 10;
      const rightMargin = 10;
      const lineSpacing = 3.5; // Spasi 1
      
      // Function untuk menambah header di setiap halaman
      function addPageHeader() {
        doc.setFontSize(12);
        doc.setFont(undefined, 'bold');
        doc.text('JURNAL 7 KEBIASAAN ANAK INDONESIA HEBAT', centerX, 12, { align: 'center' });
        
        // School Name (centered, uppercase)
        const schoolName = window.elementSdk?.config?.school_name || defaultConfig.school_name;
        doc.text(schoolName.toUpperCase(), centerX, 18, { align: 'center' });
        
        // Student Info Section dengan dots alignment
        doc.setFontSize(8);
        doc.setFont(undefined, 'normal');
        
        // Hitung panjang teks untuk alignment dots
        const labelWidth = 18; // Lebar label "Nama Siswa: ", dll
        const dotsX = leftMargin + labelWidth;
        
        // Nama Siswa dengan dots
        const namaText = `Nama Siswa:`;
        doc.text(namaText, leftMargin, 26);
        const namaWidth = doc.getTextWidth(namaText);
        const dotsLength1 = (50 - namaWidth) / doc.getTextWidth('.');
        doc.text('.'.repeat(Math.floor(dotsLength1)), leftMargin + namaWidth, 26);
        doc.text(studentData.name, leftMargin + 50, 26);
        
        // Kelas dengan dots
        const kelasText = `Kelas:`;
        doc.text(kelasText, leftMargin, 26 + lineSpacing);
        const kelasWidth = doc.getTextWidth(kelasText);
        const dotsLength2 = (50 - kelasWidth) / doc.getTextWidth('.');
        doc.text('.'.repeat(Math.floor(dotsLength2)), leftMargin + kelasWidth, 26 + lineSpacing);
        doc.text(studentData.kelas, leftMargin + 50, 26 + lineSpacing);
        
        // No. Absen dengan dots
        const absenText = `No. Absen:`;
        doc.text(absenText, leftMargin, 26 + lineSpacing * 2);
        const absenWidth = doc.getTextWidth(absenText);
        const dotsLength3 = (50 - absenWidth) / doc.getTextWidth('.');
        doc.text('.'.repeat(Math.floor(dotsLength3)), leftMargin + absenWidth, 26 + lineSpacing * 2);
        doc.text(studentData.absen, leftMargin + 50, 26 + lineSpacing * 2);
        
        // Periode dengan dots
        let filterText = 'Periode:';
        let filterValue = '';
        if (currentFilter === 'daily') {
          filterValue = 'Harian (' + formatDate(document.getElementById('select-date').value) + ')';
        } else if (currentFilter === 'weekly') {
          const selectedDate = new Date(document.getElementById('select-date').value);
          const weekStart = getWeekStart(selectedDate);
          const weekEnd = new Date(weekStart);
          weekEnd.setDate(weekEnd.getDate() + 6);
          filterValue = 'Mingguan (' + formatDate(weekStart.toISOString().split('T')[0]) + ' - ' + formatDate(weekEnd.toISOString().split('T')[0]) + ')';
        } else if (currentFilter === 'monthly') {
          const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
          filterValue = months[parseInt(document.getElementById('select-month').value)] + ' ' + document.getElementById('select-year').value;
        }
        
        doc.text(filterText, leftMargin, 26 + lineSpacing * 3);
        const filterWidth = doc.getTextWidth(filterText);
        const dotsLength4 = (50 - filterWidth) / doc.getTextWidth('.');
        doc.text('.'.repeat(Math.floor(dotsLength4)), leftMargin + filterWidth, 26 + lineSpacing * 3);
        doc.text(filterValue, leftMargin + 50, 26 + lineSpacing * 3);
      }
      
      // Add header ke halaman pertama
      addPageHeader();
      
      // Group data by date
      const dataByDate = {};
      filteredData.forEach(item => {
        if (!dataByDate[item.date]) {
          dataByDate[item.date] = {};
        }
        dataByDate[item.date][item.type] = item;
      });
      
      // Create table with one row per date, columns for each habit
      const habitTypes = ['bangun', 'ibadah', 'olahraga', 'makan', 'belajar', 'masyarakat', 'tidur'];
      const tableData = Object.keys(dataByDate).sort().map((date, index) => {
        const dayData = dataByDate[date];
        const row = [
          index + 1,
          formatDate(date)
        ];
        
        // Add columns for each of the 7 habits (just time + note)
        habitTypes.forEach(type => {
          const item = dayData[type];
          if (item) {
            const cellText = item.time + (item.note ? '\n' + item.note : '');
            row.push(cellText);
          } else {
            row.push('');
          }
        });
        
        return row;
      });
      
      // Create headers with habit names only (no icons)
      const headers = ['No', 'Tanggal'];
      habitTypes.forEach(type => {
        headers.push(habitConfig[type].title);
      });
      
      // Calculate table width to fit with 1cm margins
      const tableWidth = pageWidth - leftMargin - rightMargin; // 277mm
      
      // Calculate column widths - equal for 7 habits
      const noColWidth = 8;
      const dateColWidth = 25;
      const habitColWidth = (tableWidth - noColWidth - dateColWidth) / 7; // ~32mm each
      
      // Jarak 1 baris ke tabel (3.5mm) dari periode
      const tableStartY = 26 + lineSpacing * 4 + lineSpacing;
      
      // Space for signature section at bottom
      const signatureSectionHeight = 35; // Denpasar + spacing + labels + lines
      const rowHeight = 8; // Approximate row height
      const minRowsBeforeSignature = 2; // Minimal 2 baris data sebelum tanda tangan
      const minSpaceForSignature = signatureSectionHeight + (minRowsBeforeSignature * rowHeight);
      const availableHeight = pageHeight - tableStartY - 15; // Available space per page
      
      // Create table with calculated margins, didThrow untuk handle multiple pages
      doc.autoTable({
        startY: tableStartY,
        head: [headers],
        body: tableData,
        theme: 'grid',
        headStyles: {
          fillColor: [255, 255, 255],
          textColor: [0, 0, 0],
          fontSize: 7,
          fontStyle: 'bold',
          halign: 'center',
          valign: 'middle',
          lineColor: [0, 0, 0],
          lineWidth: 0.3
        },
        bodyStyles: {
          fontSize: 7,
          valign: 'top',
          lineColor: [0, 0, 0],
          lineWidth: 0.3
        },
        columnStyles: {
          0: { cellWidth: noColWidth, halign: 'center' },
          1: { cellWidth: dateColWidth, halign: 'left' },
          2: { cellWidth: habitColWidth, halign: 'center' },
          3: { cellWidth: habitColWidth, halign: 'center' },
          4: { cellWidth: habitColWidth, halign: 'center' },
          5: { cellWidth: habitColWidth, halign: 'center' },
          6: { cellWidth: habitColWidth, halign: 'center' },
          7: { cellWidth: habitColWidth, halign: 'center' },
          8: { cellWidth: habitColWidth, halign: 'center' }
        },
        margin: { left: leftMargin, right: rightMargin },
        didDrawPage: function(data) {
          // Add header to setiap halaman baru kecuali yang pertama
          if (data.pageNumber > 1) {
            addPageHeader();
            // Adjust table position pada halaman berikutnya
            data.startY = tableStartY;
          }
        },
        // Ensure signature section tidak terpisah ke halaman baru
        pageBreak: 'always',
        allowPageBreak: true,
        rowPageBreak: 'avoid'
      });
      
      // Add signature section di halaman terakhir
      const finalY = doc.lastAutoTable.finalY;
      const currentPage = doc.internal.getNumberOfPages();
      
      // Check if signature fit di halaman saat ini dengan minimal 2 baris data
      // Jika tidak cukup ruang, pindah halaman (dan halaman baru akan punya header + 2 baris data)
      if (finalY + minSpaceForSignature > pageHeight - 10) {
        doc.addPage('landscape', 'a4');
        addPageHeader();
        // Re-draw table dengan 2 baris data di halaman terakhir
        const lastTwoRows = tableData.slice(-2);
        doc.autoTable({
          startY: tableStartY,
          head: [headers],
          body: lastTwoRows,
          theme: 'grid',
          headStyles: {
            fillColor: [255, 255, 255],
            textColor: [0, 0, 0],
            fontSize: 7,
            fontStyle: 'bold',
            halign: 'center',
            valign: 'middle',
            lineColor: [0, 0, 0],
            lineWidth: 0.3
          },
          bodyStyles: {
            fontSize: 7,
            valign: 'top',
            lineColor: [0, 0, 0],
            lineWidth: 0.3
          },
          columnStyles: {
            0: { cellWidth: noColWidth, halign: 'center' },
            1: { cellWidth: dateColWidth, halign: 'left' },
            2: { cellWidth: habitColWidth, halign: 'center' },
            3: { cellWidth: habitColWidth, halign: 'center' },
            4: { cellWidth: habitColWidth, halign: 'center' },
            5: { cellWidth: habitColWidth, halign: 'center' },
            6: { cellWidth: habitColWidth, halign: 'center' },
            7: { cellWidth: habitColWidth, halign: 'center' },
            8: { cellWidth: habitColWidth, halign: 'center' }
          },
          margin: { left: leftMargin, right: rightMargin },
          pageBreak: 'avoid'
        });
        var signatureStartY = doc.lastAutoTable.finalY + 7;
      } else {
        var signatureStartY = finalY + 7; // 2 baris dari tabel
      }
      
      doc.setFontSize(8);
      doc.setFont(undefined, 'normal');
      
      // Tanggal di atas (kanan)
      const rightSideX = pageWidth - rightMargin - 50;
      doc.text('Denpasar, ' + new Date().toLocaleDateString('id-ID'), rightSideX, signatureStartY);
      
      // Jarak 1 baris spasi (3.5mm), kemudian label Orang Tua/Wali (kiri) dan Wali Kelas (kanan) - sejajar
      const labelY = signatureStartY + lineSpacing;
      doc.text('Orang Tua/Wali', leftMargin + 8, labelY);
      doc.text('Wali Kelas', rightSideX, labelY);
      
      // Jarak untuk ruang tanda tangan (15mm)
      const signLineY = labelY + 15;
      
      // Garis untuk tanda tangan Orang Tua (kiri)
      doc.setDrawColor(0);
      doc.setLineWidth(0.3);
      doc.line(leftMargin + 8, signLineY, leftMargin + 43, signLineY);
      
      // Garis untuk tanda tangan Wali Kelas (kanan) - sejajar dengan garis ortu
      doc.line(rightSideX, signLineY, rightSideX + 35, signLineY);
      
      // Add page numbers and print date at bottom
      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(7);
        doc.setTextColor(128);
        doc.text(`Halaman ${i} dari ${pageCount}`, centerX, 205, { align: 'center' });
        doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, leftMargin, 205);
      }
      
      // Save
      const filename = `Jurnal_7KAIH_${studentData.name.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.pdf`;
      doc.save(filename);
      showToast('PDF berhasil didownload! 📄');
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'modal-overlay') {
        closeModal();
      }
